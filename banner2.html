<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI Content Creators Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1084px;
    height: 576px;
    overflow: hidden;
    background: #0d1117;
  }
  .banner {
    width: 1084px;
    height: 576px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    background: radial-gradient(ellipse at 50% 50%, #1a2030 0%, #12161f 40%, #0d1117 70%);
    position: relative;
  }
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(70, 130, 200, 0.06) 0%, transparent 60%);
  }
  .logo-img {
    width: 320px;
    height: 320px;
    object-fit: contain;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 30px rgba(200, 170, 50, 0.15));
  }
  .title {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .title-text {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 900;
    font-size: 88px;
    letter-spacing: 4px;
    line-height: 1.2;
    background: linear-gradient(180deg, #7ecbf5 0%, #4a9fd4 40%, #3a7db8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 8px rgba(100, 180, 255, 0.3));
  }
</style>
</head>
<body>
  <div class="banner">
    <img class="logo-img" src="web/public/logo.png" alt="LoreKit Logo">
    <div class="title">
      <div class="title-text">AI Content</div>
      <div class="title-text">Creators</div>
    </div>
  </div>
</body>
</html>
